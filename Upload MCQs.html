<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Upload Excel</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>
body {
  font-family: Arial, sans-serif;
  background: linear-gradient(to right, #667eea, #764ba2);
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  margin: 0;
}

.card {
  background: #fff;
  padding: 30px;
  border-radius: 12px;
  width: 400px;
  text-align: center;
  box-shadow: 0 10px 25px rgba(0,0,0,0.2);
}

h2 {
  margin-bottom: 20px;
}

.drop-area {
  border: 2px dashed #aaa;
  padding: 25px;
  border-radius: 10px;
  cursor: pointer;
  transition: 0.3s;
}

.drop-area:hover {
  border-color: #667eea;
}

.file-name {
  margin-top: 10px;
  font-size: 14px;
  color: #555;
}

button {
  width: 100%;
  margin-top: 20px;
  padding: 12px;
  border: none;
  border-radius: 8px;
  background: #667eea;
  color: #fff;
  font-size: 16px;
  cursor: pointer;
}

button:disabled {
  background: #aaa;
  cursor: not-allowed;
}

.progress-container {
  margin-top: 20px;
  background: #eee;
  border-radius: 8px;
  overflow: hidden;
  display: none;
}

.progress-bar {
  height: 10px;
  width: 0%;
  background: #28a745;
  transition: width 0.3s;
}

#msg {
  margin-top: 15px;
  font-weight: bold;
}
</style>
</head>

<body>

<script>
if (localStorage.getItem("loggedIn") !== "true") {
  window.location.href = "index.html";
}

window.addEventListener("storage", function(e) {
  if (e.key === "logout-event") {
    window.location.href = "index.html";
  }
});
</script>

<div class="card">
  <h2>Upload Excel File</h2>

  <div class="drop-area" id="dropArea">
    Drag & Drop Excel file here<br>or click to select
    <input type="file" id="file" accept=".xlsx,.xls" hidden>
  </div>

  <div class="file-name" id="fileName"></div>

  <button id="uploadBtn" onclick="upload()">Upload</button>

  <div class="progress-container" id="progressContainer">
    <div class="progress-bar" id="progressBar"></div>
  </div>

  <p id="msg"></p>
</div>


<script>

const SCRIPT_URL = "https://script.google.com/macros/s/AKfycby9oQvh89BHntpyue41Qx50kACzGFsmj3VrGB0zRVoskCMjpwQtW3EBFSe5LYUSlFG5xQ/exec";

const fileInput = document.getElementById("file");
const dropArea = document.getElementById("dropArea");
const fileName = document.getElementById("fileName");
const uploadBtn = document.getElementById("uploadBtn");
const progressBar = document.getElementById("progressBar");
const progressContainer = document.getElementById("progressContainer");
const msg = document.getElementById("msg");

// Click to open file
dropArea.onclick = () => fileInput.click();

// Drag & drop
dropArea.addEventListener("dragover", e => {
  e.preventDefault();
  dropArea.style.borderColor = "#667eea";
});

dropArea.addEventListener("dragleave", () => {
  dropArea.style.borderColor = "#aaa";
});

dropArea.addEventListener("drop", e => {
  e.preventDefault();
  fileInput.files = e.dataTransfer.files;
  showFile();
});

// File change
fileInput.addEventListener("change", showFile);

// Validate file
function validateFile(file) {
  const allowedTypes = [
    "application/vnd.openxmlformats-officedocument.spreadsheetml.sheet",
    "application/vnd.ms-excel"
  ];

  const ext = file.name.split('.').pop().toLowerCase();

  if (!allowedTypes.includes(file.type) && !["xlsx", "xls"].includes(ext)) {
    return false;
  }
  return true;
}

// Show file
function showFile() {
  const file = fileInput.files[0];
  if (!file) return;

  if (!validateFile(file)) {
    fileInput.value = "";
    fileName.innerText = "";
    msg.innerText = "❌ Invalid file type! Please upload only .xlsx or .xls file";
    return;
  }

  msg.innerText = "";
  fileName.innerText = "Selected: " + file.name;
}

// Upload function
function upload() {
  const file = fileInput.files[0];
  if (!file) return alert("Select file");

  if (!validateFile(file)) {
    msg.innerText = "❌ Invalid file type!";
    return;
  }

  uploadBtn.disabled = true;
  msg.innerText = "";
  progressContainer.style.display = "block";

  let progress = 0;

  const interval = setInterval(() => {
    if (progress < 90) {
      progress += 5;
      progressBar.style.width = progress + "%";
    }
  }, 200);

  const reader = new FileReader();

  reader.onload = function(e) {
    const data = new Uint8Array(e.target.result);
    const wb = XLSX.read(data, { type: 'array' });
    const sheet = wb.Sheets[wb.SheetNames[0]];
    const json = XLSX.utils.sheet_to_json(sheet);

    fetch(SCRIPT_URL + "?action=upload", {
      method: "POST",
      body: JSON.stringify(json)
    })
    .then(res => res.text())
    .then(() => {
      clearInterval(interval);
      progressBar.style.width = "100%";
      msg.innerText = "✅ Upload Successful!";
      uploadBtn.disabled = false;
    })
    .catch(err => {
      clearInterval(interval);
      msg.innerText = "❌ Error: " + err.message;
      uploadBtn.disabled = false;
    });
  };

  reader.readAsArrayBuffer(file);
}

</script>

</body>
</html>
