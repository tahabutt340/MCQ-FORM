<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>MCQ Responses Viewer</title>

  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet" />

  <style>
    * { box-sizing: border-box; }

    body {
      font-family: 'Roboto', sans-serif;
      background: linear-gradient(to right, #f0f4f8, #d9e2ec);
      margin: 0;
      padding: 20px;
    }

    h2 {
      text-align: center;
      color: #2c3e50;
      font-size: 28px;
      margin-bottom: 15px;
    }

    .search-container {
      max-width: 600px;
      margin: 0 auto 15px auto;
      text-align: center;
    }

    .search-container input {
      width: 100%;
      padding: 12px 16px;
      font-size: 16px;
      border: 2px solid #3498db;
      border-radius: 8px;
      outline: none;
    }

    .table-container {
      overflow-x: auto;
      max-width: 100%;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: white;
      border-radius: 10px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.05);
      min-width: 600px;
    }

    thead th {
      background-color: #3498db;
      color: white;
      padding: 14px 16px;
      position: sticky;
      top: 0;
    }

    tbody td {
      padding: 12px 16px;
      border-bottom: 1px solid #eee;
    }

    tr:hover { background-color: #f9f9f9; }

    .no-results {
      text-align: center;
      color: #e74c3c;
      padding: 20px;
    }

    .pagination {
      margin-top: 20px;
      text-align: center;
    }

    .pagination button {
      background-color: #3498db;
      color: white;
      border: none;
      padding: 10px 16px;
      margin: 0 5px;
      border-radius: 6px;
      cursor: pointer;
    }

    .pagination button:disabled {
      background-color: #ccc;
    }

    .details-row td {
      background-color: #f1f1f1;
    }

    .details-columns {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
    }

    .details-column {
      flex: 1;
      min-width: 150px;
    }
  </style>
</head>

<body>
<!-- 🔐 LOGIN CHECK (FIXED) -->

<script>
if (localStorage.getItem("loggedIn") !== "true") {
  window.location.href = "https://tahabutt340.github.io/MCQ-FORM/login.html";
}

window.addEventListener("storage", function(e) {
  if (e.key === "logout-event") {
    window.location.href = "https://tahabutt340.github.io/MCQ-FORM/login.html";
  }
});
</script>

<h2>MCQ Responses Summary</h2>

<div class="search-container">
  <input type="text" id="searchInput" placeholder="🔍 Search by Name or EIN..." />
</div>

<div class="table-container">
  <table id="responsesTable">
    <thead></thead>
    <tbody></tbody>
  </table>
  <div id="noResults" class="no-results" style="display:none;">No results found.</div>
</div>

<div class="pagination" id="paginationControls"></div>

<script>

const sheetUrl = 'https://script.google.com/macros/s/AKfycbxmxIUKA_8V8ouVLc4d_ZvykniMVYKIqlU5GHlcR-oXYYI4NkJjmVFgohEKEbPXTWsV/exec';

const table = document.getElementById("responsesTable");
const thead = table.querySelector("thead");
const tbody = table.querySelector("tbody");
const searchInput = document.getElementById("searchInput");
const noResults = document.getElementById("noResults");
const paginationControls = document.getElementById("paginationControls");

let originalData = [];
let filteredData = [];
const rowsPerPage = 15;
let currentPage = 1;

// FETCH DATA
fetch(sheetUrl)
.then(res => res.json())
.then(data => {

  const [headers, ...rows] = data;

  originalData = rows.map(row => ({
    date: new Date(row[0]),
    name: row[1],
    ein: row[2],
    score: row[28],
    answers: row.slice(3, 28)
  }));

  originalData.sort((a, b) => b.date - a.date);
  filteredData = [...originalData];

  thead.innerHTML = `
    <tr>
      <th>Date</th>
      <th>Name</th>
      <th>EIN</th>
      <th>Score</th>
      <th>Action</th>
    </tr>`;

  renderPage(currentPage);
  renderPagination();

})
.catch(() => {
  noResults.style.display = "block";
  noResults.innerText = "❌ Failed to load data";
});

function formatDate(d) {
  return isNaN(d) ? "-" : d.toLocaleString();
}

// RENDER
function renderPage(page) {

  const start = (page - 1) * rowsPerPage;
  const end = start + rowsPerPage;

  const pageData = filteredData.slice(start, end);

  tbody.innerHTML = "";

  pageData.forEach((row) => {

    const tr = document.createElement("tr");

    tr.innerHTML = `
      <td>${formatDate(row.date)}</td>
      <td>${row.name || "-"}</td>
      <td>${row.ein || "-"}</td>
      <td>${row.score || "-"}</td>
      <td><button class="details-btn">Details</button></td>
    `;

    tbody.appendChild(tr);

    const detailsTr = document.createElement("tr");
    detailsTr.className = "details-row";
    detailsTr.style.display = "none";

    const col1 = row.answers.slice(0, 13);
    const col2 = row.answers.slice(13);

    detailsTr.innerHTML = `
      <td colspan="5">
        <div class="details-columns">
          <div class="details-column">
            ${col1.map((a,i)=>`<div>Q${i+1}: ${a || "-"}</div>`).join("")}
          </div>
          <div class="details-column">
            ${col2.map((a,i)=>`<div>Q${i+14}: ${a || "-"}</div>`).join("")}
          </div>
        </div>
      </td>
    `;

    tbody.appendChild(detailsTr);

    tr.querySelector(".details-btn").onclick = () => {
      detailsTr.style.display =
        detailsTr.style.display === "none" ? "table-row" : "none";
    };

  });

  noResults.style.display = filteredData.length ? "none" : "block";
}

// PAGINATION
function renderPagination() {

  const totalPages = Math.ceil(filteredData.length / rowsPerPage);
  paginationControls.innerHTML = "";

  const prev = document.createElement("button");
  prev.textContent = "Prev";
  prev.disabled = currentPage === 1;
  prev.onclick = () => { currentPage--; renderPage(currentPage); renderPagination(); };

  const next = document.createElement("button");
  next.textContent = "Next";
  next.disabled = currentPage === totalPages;
  next.onclick = () => { currentPage++; renderPage(currentPage); renderPagination(); };

  paginationControls.appendChild(prev);

  for (let i = 1; i <= totalPages; i++) {
    const btn = document.createElement("button");
    btn.textContent = i;
    btn.disabled = i === currentPage;
    btn.onclick = () => { currentPage = i; renderPage(i); renderPagination(); };
    paginationControls.appendChild(btn);
  }

  paginationControls.appendChild(next);
}

// 🔍 SEARCH WITH DEBOUNCE
let timeout;

searchInput.addEventListener("input", () => {

  clearTimeout(timeout);

  timeout = setTimeout(() => {

    const term = searchInput.value.trim().toLowerCase();

    filteredData = originalData.filter(r => {

      const name = (r.name || "").toString().toLowerCase();
      const ein = (r.ein || "").toString().toLowerCase();

      return name.includes(term) || ein.includes(term);
    });

    currentPage = 1;
    renderPage(currentPage);
    renderPagination();

  }, 300);

});

</script>

</body>
</html>
